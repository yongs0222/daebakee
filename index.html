<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임당체크용</title>
    <!-- 그래프 라이브러리 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #ff85a2;
            --secondary-color: #ffb3c6;
            --bg-color: #fff5f7;
            --danger-color: #ff4d4d;
            --success-color: #4caf50;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 15px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 24px;
        }
        .chart-container {
            margin: 20px 0;
            background: #fdfdfd;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #eee;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        input[type="text"], input[type="number"], input[type="date"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background-color: #ff6b8b; }
        hr { border: 0; border-top: 1px solid #eee; margin: 25px 0; }
        .record-card {
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
        }
        .record-date {
            font-weight: bold;
            font-size: 16px;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 5px;
            margin-bottom: 10px;
            color: #555;
        }
        .record-meta {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
            background: #f0f0f0;
            padding: 5px 8px;
            border-radius: 5px;
        }
        .sugar-item {
            padding: 6px 0;
            border-bottom: 1px dashed #eee;
            font-size: 14px;
        }
        .sugar-item:last-child { border-bottom: none; }
        .danger { color: var(--danger-color); font-weight: bold; }
        .success { color: var(--success-color); font-weight: bold; }
        .meal-memo {
            font-size: 12px;
            color: #777;
            margin-top: 3px;
            word-break: break-all;
        }
        .card-actions {
            position: absolute;
            top: 12px;
            right: 15px;
            display: flex;
            gap: 10px;
        }
        .action-btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 13px;
            padding: 0;
            width: auto;
            margin: 0;
            font-weight: normal;
        }
        .action-btn.edit:hover { color: #2196F3; }
        .action-btn.delete:hover { color: var(--danger-color); }
        .cheer-msg {
            font-size: 11px;
            color: #ff6b8b;
            background: #fff0f3;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🩸 임당체크용</h1>
    
    <!-- 📈 혈당 추이 그래프 섹션 -->
    <div class="chart-container">
        <canvas id="sugarChart"></canvas>
    </div>

    <!-- 📝 데일리 입력 폼 -->
    <form id="diabetesForm">
        <div class="grid-2">
            <div class="form-group">
                <label>날짜</label>
                <input type="date" id="date" required>
            </div>
            <div class="form-group">
                <label>몸무게 (kg)</label>
                <input type="number" id="weight" step="0.1" placeholder="0.0">
            </div>
        </div>
        
        <div class="form-group">
            <label>공복 혈압 (mmHg)</label>
            <input type="text" id="bp" placeholder="예: 120/80">
        </div>
        
        <hr style="margin: 15px 0;">

        <div class="form-group">
            <label>공복 혈당 (기준: 95 미만)</label>
            <div class="grid-2">
                <input type="number" id="sugar_wake" placeholder="mg/dL">
                <input type="text" id="memo_wake" placeholder="메모">
            </div>
        </div>

        <div class="form-group">
            <label>아침 식후 2시간 (기준: 120 미만)</label>
            <div class="grid-2">
                <input type="number" id="sugar_breakfast" placeholder="mg/dL">
                <input type="text" id="memo_breakfast" placeholder="먹은 음식 등">
            </div>
        </div>

        <div class="form-group">
            <label>점심 식후 2시간 (기준: 120 미만)</label>
            <div class="grid-2">
                <input type="number" id="sugar_lunch" placeholder="mg/dL">
                <input type="text" id="memo_lunch" placeholder="먹은 음식 등">
            </div>
        </div>

        <div class="form-group">
            <label>저녁 식후 2시간 (기준: 120 미만)</label>
            <div class="grid-2">
                <input type="number" id="sugar_dinner" placeholder="mg/dL">
                <input type="text" id="memo_dinner" placeholder="먹은 음식 등">
            </div>
        </div>

        <button type="submit" id="submitBtn">기록 저장 / 업데이트</button>
    </form>

    <hr>

    <h2>기록 내역</h2>
    <div id="historyList"></div>
</div>

<script>
    document.getElementById('date').value = new Date().toISOString().substring(0, 10);

    const form = document.getElementById('diabetesForm');
    const historyList = document.getElementById('historyList');
    let sugarChart = null;

    // 기본 초기 데이터 (데이터가 비어있을 때 자동 로드)
    const initialData = [
        {
            id: 1718928000000, date: "2026-06-21", weight: "", bp: "",
            wake: { val: "88", memo: "" },
            breakfast: { val: "90", memo: "오이, 부침개, 닭도리탕, 쌈채소, 감자, 오이 고수무침" },
            lunch: { val: "", memo: "" },
            dinner: { val: "", memo: "" }
        },
        {
            id: 1718841600000, date: "2026-06-20", weight: "", bp: "",
            wake: { val: "91", memo: "" },
            breakfast: { val: "117", memo: "토마토, 흰밥1/2, 무생채, 쌈채소, 계란찜, 김치볶음" },
            lunch: { val: "123", memo: "누룽지 왕뚜꺼우라면 1/3, 오이 1/3" },
            dinner: { val: "114", memo: "오이 1/2, 마라떡볶이 야채랑 오뎅만" }
        },
        {
            id: 1718755200000, date: "2026-06-19", weight: "", bp: "",
            wake: { val: "93", memo: "" },
            breakfast: { val: "102", memo: "오이, 참외, 계란쨈샌드위치" },
            lunch: { val: "130", memo: "흰밥, 숭륭, 전복볶음, 김치볶음, 딸기우유 1먹음, 20분 산책" },
            dinner: { val: "206", memo: "토마토1, 마라떡볶이, 피자1조각, 쿨피스 한목음" }
        }
    ];

    let records = JSON.parse(localStorage.getItem('sugarRecords'));
    if (!records || records.length === 0) {
        records = initialData;
        localStorage.setItem('sugarRecords', JSON.stringify(records));
    }

    // 초기 실행
    renderAll();

    // 등록 및 업데이트 처리
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const inputDate = document.getElementById('date').value;
        
        const newRecord = {
            id: Date.now(),
            date: inputDate,
            weight: document.getElementById('weight').value,
            bp: document.getElementById('bp').value,
            wake: { val: document.getElementById('sugar_wake').value, memo: document.getElementById('memo_wake').value },
            breakfast: { val: document.getElementById('sugar_breakfast').value, memo: document.getElementById('memo_breakfast').value },
            lunch: { val: document.getElementById('sugar_lunch').value, memo: document.getElementById('memo_lunch').value },
            dinner: { val: document.getElementById('sugar_dinner').value, memo: document.getElementById('memo_dinner').value }
        };

        // 데일리 업데이트 로직: 같은 날짜가 있다면 지우고 새로 끼워넣음
        records = records.filter(r => r.date !== inputDate);
        records.push(newRecord);
        records.sort((a, b) => new Date(b.date) - new Date(a.date));
        
        localStorage.setItem('sugarRecords', JSON.stringify(records));
        renderAll();
        
        // 폼 초기화 (날짜는 유지)
        form.reset();
        document.getElementById('date').value = inputDate;
        alert(`${inputDate} 기록이 저장/업데이트 되었습니다.`);
    });

    // 수정 버튼 기능 (해당 데이터를 상단 입력 폼으로 불러오기)
    function editRecord(date) {
        const target = records.find(r => r.date === date);
        if(!target) return;

        document.getElementById('date').value = target.date;
        document.getElementById('weight').value = target.weight;
        document.getElementById('bp').value = target.bp;
        
        document.getElementById('sugar_wake').value = target.wake.val;
        document.getElementById('memo_wake').value = target.wake.memo;
        
        document.getElementById('sugar_breakfast').value = target.breakfast.val;
        document.getElementById('memo_breakfast').value = target.breakfast.memo;
        
        document.getElementById('sugar_lunch').value = target.lunch.val;
        document.getElementById('memo_lunch').value = target.lunch.memo;
        
        document.getElementById('sugar_dinner').value = target.dinner.val;
        document.getElementById('memo_dinner').value = target.dinner.memo;

        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function deleteRecord(id) {
        if(confirm("이 기록을 삭제하시겠습니까?")) {
            records = records.filter(r => r.id !== id);
            localStorage.setItem('sugarRecords', JSON.stringify(records));
            renderAll();
        }
    }

    function getDayOfWeek(dateString) {
        const week = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        return week[new Date(dateString).getDay()];
    }

    function renderAll() {
        renderRecords();
        updateChart();
    }

    function renderRecords() {
        historyList.innerHTML = '';
        if(records.length === 0) {
            historyList.innerHTML = '<p style="color:#999; text-align:center;">기록된 데이터가 없습니다.</p>';
            return;
        }

        records.forEach(r => {
            const card = document.createElement('div');
            card.className = 'record-card';
            const dayOfWeek = getDayOfWeek(r.date);
            
            const createSugarLine = (title, data, limit) => {
                if (!data.val) return `<div class="sugar-item"><span>◦ ${title}</span><span style="color:#aaa;">미기록</span></div>`;
                const val = parseInt(data.val);
                const isOver = val > limit;
                const statusClass = isOver ? "danger" : "success";
                const warningMsg = isOver ? `<span class="cheer-msg">토닥토닥, 다음 끼니에 조절해요! 🤍</span>` : '';
                
                return `
                    <div class="sugar-item">
                        <div>
                            <span class="${statusClass}">✓ ${val} mg/dL</span> 
                            <span style="font-size:12px; color:#777;">(${title} >${limit}mg/dL)</span>
                            ${warningMsg}
                            ${data.memo ? `<div class="meal-memo">↳ 📝 ${data.memo}</div>` : ''}
                        </div>
                    </div>
                `;
            };

            card.innerHTML = `
                <div class="card-actions">
                    <button class="action-btn edit" onclick="editRecord('${r.date}')">수정</button>
                    <button class="action-btn delete" onclick="deleteRecord(${r.id})">삭제</button>
                </div>
                <div class="record-date">${r.date} ${dayOfWeek}</div>
                <div class="record-meta">
                    <span>공복혈압: ${r.bp ? r.bp + ' mmHg' : '-'}</span>
                    <span>몸무게: ${r.weight ? r.weight + ' kg' : '-'}</span>
                </div>
                ${createSugarLine('공복 혈당', r.wake, 95)}
                ${createSugarLine('아침 식후', r.breakfast, 120)}
                ${createSugarLine('점심 식후', r.lunch, 120)}
                ${createSugarLine('저녁 식후', r.dinner, 120)}
            `;
            historyList.appendChild(card);
        });
    }

    // 📈 차트 업데이트 기능 (날짜 오름차순으로 정렬해서 그림)
    function updateChart() {
        const sortedRecords = [...records].sort((a, b) => new Date(a.date) - new Date(b.date));
        
        const labels = sortedRecords.map(r => r.date.substring(5)); // 'MM-DD' 형태 추출
        const wakeData = sortedRecords.map(r => r.wake.val || null);
        const breakfastData = sortedRecords.map(r => r.breakfast.val || null);
        const lunchData = sortedRecords.map(r => r.lunch.val || null);
        const dinnerData = sortedRecords.map(r => r.dinner.val || null);

        if (sugarChart) {
            sugarChart.destroy();
        }

        const ctx = document.getElementById('sugarChart').getContext('2d');
        sugarChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: '공복', data: wakeData, borderColor: '#ffb3c6', backgroundColor: '#ffb3c6', tension: 0.1, spanGaps: true },
                    { label: '아침', data: breakfastData, borderColor: '#4caf50', backgroundColor: '#4caf50', tension: 0.1, spanGaps: true },
                    { label: '점심', data: lunchData, borderColor: '#2196F3', backgroundColor: '#2196F3', tension: 0.1, spanGaps: true },
                    { label: '저녁', data: dinnerData, borderColor: '#9c27b0', backgroundColor: '#9c27b0', tension: 0.1, spanGaps: true }
                ]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'top', labels: { boxWidth: 12, font: { size: 11 } } },
                    tooltip: { mode: 'index', intersect: false }
                },
                scales: {
                    y: {
                        beginAtZero: false,
                        suggestedMin: 70,
                        suggestedMax: 150,
                        title: { display: true, text: 'mg/dL', font: { size: 10 } }
                    }
                }
            }
        });
    }
</script>

</body>
</html>
