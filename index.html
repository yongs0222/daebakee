<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestational Diabetes Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #ff85a2;
            --secondary-color: #ffb3c6;
            --bg-color: #fff5f7;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
            --danger-color: #ff4d4d;
            --success-color: #4caf50;
            --meta-bg: #f0f0f0;
            --card-border: #eeeeee;
            --theme-bible-bg: #fff0f3;
            --bible-text-color: #333333;
        }
        [data-theme="nighttime"] {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #f0f0f0;
            --border-color: #444444;
            --meta-bg: #3d3d3d;
            --card-border: #444444;
            --theme-bible-bg: #3d242b;
            --bible-text-color: #f0f0f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 15px;
        }
        .container { max-width: 600px; margin: 0 auto; background: var(--card-bg); padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .top-controls { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 15px; }
        .top-btn { background: var(--meta-bg); color: var(--text-color); border: 1px solid var(--border-color); padding: 6px 12px; font-size: 12px; border-radius: 20px; cursor: pointer; }
        h1 { text-align: center; color: var(--primary-color); margin-bottom: 5px; font-size: 24px; }
        h2 { color: var(--text-color); font-size: 18px; margin-top: 0; }
        
        .loading-sync {
            display: none; background: #eaf4ff; color: #1a73e8; text-align: center; padding: 8px; border-radius: 8px;
            font-size: 13px; margin-bottom: 15px; font-weight: bold;
        }
        
        .bible-box { 
            background-color: var(--theme-bible-bg); 
            color: var(--bible-text-color);
            border-left: 4px solid var(--primary-color); 
            padding: 12px 15px; 
            margin: 15px 0; 
            border-radius: 4px; 
            font-size: 14px; 
            line-height: 1.5; 
        }
        .bible-ref { font-size: 12px; color: var(--primary-color); text-align: right; font-weight: bold; margin-top: 5px; }
        
        .toggle-section-btn { background-color: var(--meta-bg); color: var(--text-color); padding: 8px 12px; font-size: 13px; border-radius: 20px; width: auto; margin: 10px auto; display: block; border: 1px solid var(--border-color); cursor: pointer; }
        
        /* 💡 접고 펴는 컨테이너 기본 공통 속성 */
        .foldable-container { 
            max-height: 0; 
            overflow: hidden; 
            transition: max-height 0.4s ease-in-out; 
            padding: 0 10px; 
            width: 100%;
            box-sizing: border-box;
        }

        /* 📈 1. 그래프 박스가 열릴 때 크기 제한 */
        #chartContainer.open { 
            max-height: 340px; 
            padding: 10px; 
        }
        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 300px;
        }

        /* 📜 2. [핵심 수정] 기록 내역 박스가 열릴 때는 높이 제한을 완전히 해제하여 무제한 노출 */
        #historyContainer.open { 
            max-height: none !important; 
            overflow: visible !important;
            padding: 10px; 
        }

        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="number"], input[type="date"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid var(--border-color); border-radius: 8px; font-size: 15px; background: var(--card-bg); color: var(--text-color); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .submit-btn { width: 100%; padding: 12px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .submit-btn:disabled { background-color: #ccc; cursor: not-allowed; }
        hr { border: 0; border-top: 1px solid var(--border-color); margin: 25px 0; }
        
        .record-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 10px; padding: 15px; margin-bottom: 15px; position: relative; }
        .record-date { font-weight: bold; font-size: 16px; border-bottom: 2px solid var(--secondary-color); padding-bottom: 5px; margin-bottom: 10px; }
        .record-meta { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 10px; background: var(--meta-bg); padding: 5px 8px; border-radius: 5px; }
        .sugar-item { padding: 6px 0; border-bottom: 1px dashed var(--border-color); font-size: 14px; }
        .sugar-item:last-child { border-bottom: none; }
        .danger { color: var(--danger-color); font-weight: bold; }
        .success { color: var(--success-color); font-weight: bold; }
        .meal-memo { font-size: 12px; color: #666; margin-top: 4px; padding-left: 10px; font-style: italic; word-break: break-all; }
        .card-actions { position: absolute; top: 12px; right: 15px; display: flex; gap: 10px; }
        .action-btn { background: none; border: none; color: #ff85a2; cursor: pointer; font-size: 13px; font-weight: bold; }
        .action-btn:hover { color: #2196F3; }
        .cheer-msg { font-size: 11px; color: #ff6b8b; background: #fff0f3; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-controls">
        <button class="top-btn" id="langBtn" onclick="toggleLang()">EN</button>
        <button class="top-btn" id="themeBtn" onclick="toggleTheme()">🌙 Nighttime</button>
    </div>

    <h1>지희 대박이 임당체크용</h1>
    <div class="loading-sync" id="syncBar">🔄 구글 클라우드에서 최신 데이터를 동기화하는 중...</div>
    
    <div class="bible-box" id="bibleBox">
        <div class="bible-verse" id="bibleVerse">-</div>
        <div class="bible-ref" id="bibleRef">-</div>
    </div>

    <button type="button" class="toggle-section-btn" id="chartToggleBtn" onclick="toggleChart()">📈 혈당 추이 그래프 보기</button>
    <div class="foldable-container" id="chartContainer">
        <div class="chart-wrapper">
            <canvas id="sugarChart"></canvas>
        </div>
    </div>

    <form id="diabetesForm">
        <div class="grid-2">
            <div class="form-group">
                <label id="lblDate">날짜</label>
                <input type="date" id="date" required>
            </div>
            <div class="form-group">
                <label id="lblWeight">몸무게 (kg)</label>
                <input type="number" id="weight" step="0.1" placeholder="0.0">
            </div>
        </div>
        
        <div class="form-group">
            <label id="lblBp">공복 혈압 (mmHg)</label>
            <input type="text" id="bp" placeholder="예: 120/80">
        </div>
        
        <hr style="margin: 15px 0;">

        <div class="form-group">
            <label id="lblWake">공복 혈당 (기준: 95 미만)</label>
            <div class="grid-2">
                <input type="text" id="sugar_wake" placeholder="mg/dL">
                <input type="text" id="memo_wake" placeholder="메모">
            </div>
        </div>

        <div class="form-group">
            <label id="lblBreakfast">아침 식후 2시간 (기준: 120 미만)</label>
            <div class="grid-2">
                <input type="text" id="sugar_breakfast" placeholder="mg/dL">
                <input type="text" id="memo_breakfast" placeholder="먹은 음식 등">
            </div>
        </div>

        <div class="form-group">
            <label id="lblLunch">점심 식후 2시간 (기준: 120 미만)</label>
            <div class="grid-2">
                <input type="text" id="sugar_lunch" placeholder="mg/dL">
                <input type="text" id="memo_lunch" placeholder="먹은 음식 등">
            </div>
        </div>

        <div class="form-group">
            <label id="lblDinner">저녁 식후 2시간 (기준: 120 미만)</label>
            <div class="grid-2">
                <input type="text" id="sugar_dinner" placeholder="mg/dL">
                <input type="text" id="memo_dinner" placeholder="먹은 음식 등">
            </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">기록 저장 / 업데이트</button>
    </form>

    <hr>

    <button type="button" class="toggle-section-btn" id="historyToggleBtn" onclick="toggleHistory()">📜 기록 내역 보기</button>
    <div class="foldable-container" id="historyContainer">
        <h2 id="subTitle">기록 내역</h2>
        <div id="historyList"></div>
    </div>
</div>

<script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyWE-xETMUawi907tX_Cg_7g_p7E4QA8CP1RL6tUyIMimciCesECuP0NdiL_QQeFt0m/exec';
    
    const langPack = {
        ko: {
            subtitle: "기록 내역", date: "날짜", weight: "몸무게 (kg)",
            bp: "공복 혈압 (mmHg)", wake: "공복 혈당", breakfast: "아침 식후 2시간", lunch: "점심 식후 2시간", dinner: "저녁 식후 2시간",
            submit: "기록 저장 / 업데이트", saving: "구글 시트 저장 중...", unrecorded: "미기록", loading: "🔄 구글 클라우드에서 동기화 중...",
            cheer: "토닥토닥, 다음 끼니에 조절해요! 🤍"
        },
        en: {
            subtitle: "History Logs", date: "Date", weight: "Weight (kg)",
            bp: "BP (mmHg)", wake: "Fasting", breakfast: "Breakfast 2hr", lunch: "Lunch 2hr", dinner: "Dinner 2hr",
            submit: "Save Record", saving: "Saving...", unrecorded: "No Record", loading: "🔄 Syncing data...",
            cheer: "It's okay, manage next meal! 🤍"
        }
    };

    let currentLang = localStorage.getItem('sugarLang') || 'ko';
    let currentTheme = localStorage.getItem('sugarTheme') || 'daytime';
    let records = [];
    let sugarChart = null;

    const bibleVerses = [
        { v: "너의 하나님 여호와가 너의 가운데에 계시니 그는 구원을 베푸실 전능자이시라 그가 너로 말미암아 기쁨을 이기지 못하시며 너를 잠잠히 사랑하시며 너로 말미암아 즐거이 부르며 기뻐하시리라", r: "스바냐 3:17" }
    ];

    records = JSON.parse(localStorage.getItem('sugarRecords')) || [];
    
    const initNow = new Date();
    document.getElementById('date').value = `${initNow.getFullYear()}-${String(initNow.getMonth() + 1).padStart(2, '0')}-${String(initNow.getDate()).padStart(2, '0')}`;
    document.getElementById('date').addEventListener('change', function() { loadRecordByDate(this.value); });
    document.documentElement.setAttribute('data-theme', currentTheme);
    
    applyLanguage();
    setDailyVerse();
    renderRecords();
    fetchCloudData();

    function applyLanguage() {
        const p = langPack[currentLang];
        document.getElementById('subTitle').innerText = p.subtitle;
        document.getElementById('lblDate').innerText = p.date;
        document.getElementById('lblWeight').innerText = p.weight;
        document.getElementById('lblBp').innerText = p.bp;
        document.getElementById('lblWake').innerText = p.wake + " (<95)";
        document.getElementById('lblBreakfast').innerText = p.breakfast + " (<120)";
        document.getElementById('lblLunch').innerText = p.lunch + " (<120)";
        document.getElementById('lblDinner').innerText = p.dinner + " (<120)";
        document.getElementById('syncBar').innerText = p.loading;
        document.getElementById('submitBtn').innerText = p.submit;
        document.getElementById('langBtn').innerText = currentLang === 'ko' ? 'EN' : 'KO';
    }

    function fetchCloudData() {
        if (!GOOGLE_SCRIPT_URL) return;
        document.getElementById('syncBar').style.display = 'block';

        fetch(GOOGLE_SCRIPT_URL)
            .then(res => res.json())
            .then(cloudRecords => {
                if (cloudRecords && cloudRecords.length > 0) {
                    records = cloudRecords;
                    localStorage.setItem('sugarRecords', JSON.stringify(records));
                    renderRecords();
                    if(document.getElementById('chartContainer').classList.contains('open')) {
                        updateChart();
                    }
                    loadRecordByDate(document.getElementById('date').value);
                }
                document.getElementById('syncBar').style.display = 'none';
            })
            .catch(err => {
                console.error(err);
                document.getElementById('syncBar').style.display = 'none';
            });
    }

    function toggleLang() {
        currentLang = currentLang === 'ko' ? 'en' : 'ko';
        localStorage.setItem('sugarLang', currentLang);
        applyLanguage();
        renderRecords();
    }

    function toggleTheme() {
        currentTheme = currentTheme === 'daytime' ? 'nighttime' : 'daytime';
        localStorage.setItem('sugarTheme', currentTheme);
        document.documentElement.setAttribute('data-theme', currentTheme);
    }

    function setDailyVerse() {
        document.getElementById('bibleVerse').innerText = bibleVerses[0].v;
        document.getElementById('bibleRef').innerText = bibleVerses[0].r;
    }

    function toggleChart() {
        const container = document.getElementById('chartContainer');
        const isOpen = container.classList.toggle('open');
        
        if (isOpen) {
            setTimeout(() => {
                updateChart();
            }, 50);
        } else {
            if (sugarChart) {
                sugarChart.destroy();
                sugarChart = null;
            }
        }
    }

    function toggleHistory() {
        const container = document.getElementById('historyContainer');
        container.classList.toggle('open');
    }

    function formatLoadingDate(dateStr) {
        if (!dateStr) return "";
        let str = String(dateStr).trim();
        
        if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
            return str;
        }

        const parsedDate = new Date(str);
        if (!isNaN(parsedDate.getTime())) {
            let year = parsedDate.getFullYear();
            let month = String(parsedDate.getMonth() + 1).padStart(2, '0');
            let day = String(parsedDate.getDate()).padStart(2, '0');
            if (year === 2021 || year < 2020) year = 2026;
            return `${year}-${month}-${day}`;
        }

        let matches = str.match(/\d+/g);
        if (matches && matches.length >= 3) {
            let year = matches[0].length === 4 ? matches[0] : (matches[2].length === 4 ? matches[2] : "2026");
            let month = matches[0].length === 4 ? matches[1] : matches[0];
            let day = matches[0].length === 4 ? matches[2] : matches[1];
            if (parseInt(month) > 12) { const tmp = month; month = day; day = tmp; }
            if (year === "2021" || year === "21") year = "2026";
            return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }
        
        return str.substring(0, 10);
    }

    function editRecord(date) {
        loadRecordByDate(formatLoadingDate(date));
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function loadRecordByDate(dateString) {
        const targetDate = formatLoadingDate(dateString);
        
        const target = records.find(r => {
            const cleanedRecordDate = formatLoadingDate(r.date);
            return cleanedRecordDate === targetDate;
        });
        
        document.getElementById('diabetesForm').reset();
        document.getElementById('date').value = targetDate;
        
        if (target) {
            document.getElementById('weight').value = target.weight || "";
            document.getElementById('bp').value = target.bp || "";
            document.getElementById('sugar_wake').value = target.wake?.val || "";
            document.getElementById('memo_wake').value = target.wake?.memo || "";
            document.getElementById('sugar_breakfast').value = target.breakfast?.val || "";
            document.getElementById('memo_breakfast').value = target.breakfast?.memo || "";
            document.getElementById('sugar_lunch').value = target.lunch?.val || "";
            document.getElementById('memo_lunch').value = target.lunch?.memo || "";
            document.getElementById('sugar_dinner').value = target.dinner?.val || "";
            document.getElementById('memo_dinner').value = target.dinner?.memo || "";
        }
    }

    document.getElementById('diabetesForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const p = langPack[currentLang];
        const btnSubmit = document.getElementById('submitBtn');
        const inputDate = document.getElementById('date').value;

        const newRecord = {
            id: Date.now(), date: inputDate,
            weight: document.getElementById('weight').value,
            bp: document.getElementById('bp').value,
            loggedAt: new Date().toLocaleString(),
            wake: { val: document.getElementById('sugar_wake').value, memo: document.getElementById('memo_wake').value },
            breakfast: { val: document.getElementById('sugar_breakfast').value, memo: document.getElementById('memo_breakfast').value },
            lunch: { val: document.getElementById('sugar_lunch').value, memo: document.getElementById('memo_lunch').value },
            dinner: { val: document.getElementById('sugar_dinner').value, memo: document.getElementById('memo_dinner').value }
        };

        const postPayload = {
            id: newRecord.id, date: newRecord.date, weight: newRecord.weight, bp: newRecord.bp, loggedAt: newRecord.loggedAt,
            wake_val: newRecord.wake.val, wake_memo: newRecord.wake.memo,
            breakfast_val: newRecord.breakfast.val, breakfast_memo: newRecord.breakfast.memo,
            lunch_val: newRecord.lunch.val, lunch_memo: newRecord.lunch.memo,
            dinner_val: newRecord.dinner.val, dinner_memo: newRecord.dinner.memo
        };

        btnSubmit.disabled = true;
        btnSubmit.innerText = p.saving;

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(postPayload)
        })
        .then(() => {
            btnSubmit.disabled = false;
            applyLanguage();
            fetchCloudData();
        })
        .catch(err => {
            console.error(err);
            btnSubmit.disabled = false;
            applyLanguage();
        });
    });

    function renderRecords() {
        const historyList = document.getElementById('historyList');
        historyList.innerHTML = '';
        const p = langPack[currentLang];
        if(!records || records.length === 0) return;

        const sorted = [...records].sort((a,b) => formatLoadingDate(b.date).localeCompare(formatLoadingDate(a.date)));

        sorted.forEach(r => {
            const card = document.createElement('div');
            card.className = 'record-card';
            
            const cleanDate = formatLoadingDate(r.date);
            
            const createSugarLine = (title, data, limit) => {
                if (!data || (!data.val && !data.memo)) return `<div class="sugar-item"><span>◦ ${title}</span><span style="color:#aaa;">: ${p.unrecorded}</span></div>`;
                const valStr = String(data.val || "").trim();
                const numMatch = valStr.match(/\d+/);
                const numericVal = numMatch ? parseInt(numMatch[0]) : 0;
                const isOver = numericVal > limit;
                
                return `
                    <div class="sugar-item">
                        <span class="${numericVal > 0 ? (isOver ? "danger" : "success") : ""}">✓ ${valStr || p.unrecorded} mg/dL</span> 
                        <span style="font-size:12px; color:#777;">(${title})</span>
                        ${(numericVal > 0 && isOver) ? `<span class="cheer-msg">${p.cheer}</span>` : ''}
                        ${data.memo ? `<div class="meal-memo">↳ 📝 ${data.memo}</div>` : ''}
                    </div>`;
            };

            card.innerHTML = `
                <div class="card-actions">
                    <button class="action-btn edit" onclick="editRecord('${cleanDate}')">Edit</button>
                </div>
                <div class="record-date">${cleanDate}</div>
                <div class="record-meta">
                    <span>BP: ${r.bp || '-'}</span><span>Wt: ${r.weight ? r.weight + 'kg' : '-'}</span>
                </div>
                ${createSugarLine(currentLang === 'ko' ? '공복' : 'Fasting', r.wake, 95)}
                ${createSugarLine(currentLang === 'ko' ? '아침' : 'Breakfast', r.breakfast, 120)}
                ${createSugarLine(currentLang === 'ko' ? '점심' : 'Lunch', r.lunch, 120)}
                ${createSugarLine(currentLang === 'ko' ? '저녁' : 'Dinner', r.dinner, 120)}
            `;
            historyList.appendChild(card);
        });
    }

    function updateChart() {
        if (sugarChart) sugarChart.destroy();
        
        const sortedRecords = [...records].sort((a, b) => formatLoadingDate(a.date).localeCompare(formatLoadingDate(b.date)));
        const labels = sortedRecords.map(r => formatLoadingDate(r.date).substring(5));

        const parseChartVal = (d) => { if(!d || !d.val) return null; const m = String(d.val).match(/\d+/); return m ? parseInt(m[0]) : null; };

        const ctx = document.getElementById('sugarChart').getContext('2d');
        sugarChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: '공복', data: sortedRecords.map(r => parseChartVal(r.wake)), borderColor: '#ffb3c6', spanGaps: true },
                    { label: '아침', data: sortedRecords.map(r => parseChartVal(r.breakfast)), borderColor: '#4caf50', spanGaps: true },
                    { label: '점심', data: sortedRecords.map(r => parseChartVal(r.lunch)), borderColor: '#2196F3', spanGaps: true },
                    { label: '저녁', data: sortedRecords.map(r => parseChartVal(r.dinner)), borderColor: '#9c27b0', spanGaps: true }
                ]
            },
            options: { 
                responsive: true,
                maintainAspectRatio: false
            }
        });
    }
</script>
</body>
</html>
